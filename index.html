<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>レビュシートカウンター</title>
<style>
  body { font-family: -apple-system, system-ui; margin: 18px; background:#f6f7f9; }
  h1 { font-size: 20px; margin: 0 0 10px; }

  select { padding: 8px 12px; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }

  .card { background:#fff; padding:16px; border-radius:16px; box-shadow:0 6px 18px rgba(0,0,0,.08); }

  /* ✅ 列幅固定で、数字が増えても横に伸びない */
  table { width: 100%; table-layout: fixed; border-collapse: separate; border-spacing: 10px; }

  th { font-size: 13px; font-weight: 800; color:#333; }

  /* ✅ 主菜/副菜の文字が折り返されない（幅を少し縮めてボタン幅を確保） */
  .rowlbl {
    text-align: left;
    font-weight: 900;
    white-space: nowrap;
    width: 72px;          /* ← 84px → 72px */
  }

  /* 星の列と合計列も幅固定（端末に合わせて自動で均等配分される） */
  .starcol, .sumcol { width: calc((100% - 72px) / 6); }

  button.cell{
    width: 100%;
    height: 64px;         /* ← 56px → 64px（タップしやすく） */
    border-radius: 14px;
    border: none;
    background: #111;
    color: #fff;
    font-size: 20px;
    font-weight: 900;
    line-height: 1;
    padding: 0;
    touch-action: manipulation;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: clip;
  }
  button.cell:active { transform: scale(0.99); opacity: .92; }

  /* 合計セル（表示専用） */
  .sumBox{
    width: 100%;
    height: 64px;         /* ボタンと同じ高さ */
    border-radius: 14px;
    background: #f1f2f4;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: #111;
  }

  .actions { display:flex; gap:10px; margin-top: 14px; }
  .btn { flex:1; padding:12px; border-radius:12px; border:1px solid #ccc; font-weight: 900; background:#fff; }
  .btn.danger { border-color:#ffb3b3; }
  .btn:active { transform: scale(0.99); }
</style>
</head>

<body>
<h1>レビュシートカウンター</h1>

<select id="dateSelect">
  <option>2/16（月）</option>
  <option>2/17（火）</option>
  <option>2/18（水）</option>
  <option>2/19（木）</option>
  <option>2/20（金）</option>
  <option>2/23（月）</option>
  <option>2/24（火）</option>
  <option>2/25（水）</option>
  <option>2/26（木）</option>
  <option>2/27（金）</option>
</select>

<div class="card">
  <table>
    <thead>
      <tr>
        <th class="rowlbl"></th>
        <th class="starcol">★1</th>
        <th class="starcol">★2</th>
        <th class="starcol">★3</th>
        <th class="starcol">★4</th>
        <th class="starcol">★5</th>
        <th class="sumcol">計</th>
      </tr>
    </thead>
    <tbody id="grid"></tbody>
  </table>

  <div class="actions">
    <button class="btn" id="undoBtn">ひとつ戻す</button>
    <button class="btn danger" id="resetBtn">RESET（全て0）</button>
  </div>
</div>

<script>
  const rows = ["主菜","副菜1","副菜2"];
  const cols = [1,2,3,4,5];
  const KEY  = "review_counter_v3";

  let state = {};    // { "2/16（月）": [[...],[...],[...]] , ... }
  let history = [];  // [{date,r,c}...]

  function getDate(){
    return document.getElementById("dateSelect").value;
  }

  function initDate(date){
    if(!state[date]){
      state[date] = Array.from({length: 3}, () => Array(5).fill(0));
    }
  }

  function load(){
    try{
      const raw = localStorage.getItem(KEY);
      if(raw) state = JSON.parse(raw) || {};
    }catch{}
  }

  function save(){
    localStorage.setItem(KEY, JSON.stringify(state));
  }

  function rowSum(arr){
    return arr.reduce((a,b)=>a + Number(b || 0), 0);
  }

  function render(){
    const date = getDate();
    initDate(date);

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    rows.forEach((label, r) => {
      const tr = document.createElement("tr");

      const th = document.createElement("th");
      th.className = "rowlbl";
      th.textContent = label;
      tr.appendChild(th);

      // ★1〜★5
      cols.forEach((_, c) => {
        const td = document.createElement("td");

        const btn = document.createElement("button");
        btn.className = "cell";
        btn.type = "button";
        btn.textContent = state[date][r][c];

        btn.addEventListener("click", () => {
          state[date][r][c] += 1;
          history.push({date, r, c});
          if(history.length > 5000) history.shift();
          save();
          render();
        });

        td.appendChild(btn);
        tr.appendChild(td);
      });

      // ✅ 右端の合計（計）
      const tdSum = document.createElement("td");
      const sum = rowSum(state[date][r]);

      const sumBox = document.createElement("div");
      sumBox.className = "sumBox";
      sumBox.textContent = sum;

      tdSum.appendChild(sumBox);
      tr.appendChild(tdSum);

      grid.appendChild(tr);
    });
  }

  function undo(){
    const last = history.pop();
    if(!last) return;

    const {date, r, c} = last;
    initDate(date);
    state[date][r][c] = Math.max(0, Number(state[date][r][c] || 0) - 1);

    save();
    render();
  }

  function resetDay(){
    const date = getDate();
    if(!confirm(`${date} を全て0にします。よろしいですか？`)) return;

    state[date] = Array.from({length: 3}, () => Array(5).fill(0));
    save();
    render();
  }

  document.getElementById("dateSelect").addEventListener("change", render);
  document.getElementById("undoBtn").addEventListener("click", undo);
  document.getElementById("resetBtn").addEventListener("click", resetDay);

  load();
  render();
</script>
</body>
</html>
