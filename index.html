<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>星評価カウンター</title>
  <style>
    :root { --gap: 10px; --radius: 14px; }
    body { font-family: -apple-system, system-ui, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
           margin: 18px; background:#f6f7f9; color:#111; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    .wrap { max-width: 560px; margin: 0 auto; }
    .card { background:#fff; border-radius: 16px; padding: 14px; box-shadow: 0 6px 18px rgba(0,0,0,.08); }
    .meta { font-size: 12px; color:#555; margin-top: 8px; }
    table { width:100%; border-collapse: separate; border-spacing: var(--gap); }
    th, td { text-align:center; }
    th { font-size: 13px; color:#333; font-weight: 700; }
    .rowlbl { text-align:left; font-weight:700; white-space:nowrap; padding-left: 6px; }
    button.cell {
      width: 100%;
      padding: 14px 8px;
      border: 0;
      border-radius: var(--radius);
      background: #111;
      color: #fff;
      font-size: 20px;
      font-weight: 800;
      line-height: 1;
      touch-action: manipulation;
    }
    button.cell:active { transform: scale(0.98); opacity: .9; }
    .stars { font-size: 12px; color:#555; font-weight: 700; }
    .actions { display:flex; gap: 10px; margin-top: 12px; }
    .btn {
      flex: 1;
      padding: 12px 10px;
      border-radius: 12px;
      border: 1px solid #ddd;
      background:#fff;
      font-weight: 800;
      font-size: 14px;
    }
    .btn.danger { border-color:#ffb3b3; }
    .btn:active { transform: scale(0.99); }
    .small { font-size: 12px; color:#666; margin-top: 10px; }
    .hint { font-size: 12px; color:#666; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>星評価カウンター（3品×5段階）</h1>
    <div class="card">
      <table aria-label="counter">
        <thead>
          <tr>
            <th></th>
            <th><div class="stars">★1</div></th>
            <th><div class="stars">★2</div></th>
            <th><div class="stars">★3</div></th>
            <th><div class="stars">★4</div></th>
            <th><div class="stars">★5</div></th>
          </tr>
        </thead>
        <tbody id="grid"></tbody>
      </table>

      <div class="actions">
        <button class="btn" id="undoBtn">ひとつ戻す</button>
        <button class="btn danger" id="resetBtn">RESET（全て0）</button>
      </div>

      <div class="meta" id="meta"></div>
      <div class="hint">使い方：紙を見て該当セルをタップ → 数が+1。数え終わったらRESET。</div>
      <div class="small">※端末内に保存（同じ端末・同じブラウザなら保持されます）。</div>
    </div>
  </div>

<script>
(() => {
  const rows = ["主菜", "副菜1", "副菜2"];
  const cols = [1,2,3,4,5];
  const KEY = "star_counter_v1";

  const state = {
    counts: Array.from({length: rows.length}, () => Array(cols.length).fill(0)),
    history: [] // for undo: [{r,c}]
  };

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return;
      const obj = JSON.parse(raw);
      if (obj?.counts?.length === 3) state.counts = obj.counts;
      if (Array.isArray(obj?.history)) state.history = obj.history;
    } catch {}
  }
  function save() {
    localStorage.setItem(KEY, JSON.stringify({counts: state.counts, history: state.history}));
  }

  const grid = document.getElementById("grid");
  const meta = document.getElementById("meta");

  function render() {
    grid.innerHTML = "";
    rows.forEach((label, r) => {
      const tr = document.createElement("tr");

      const th = document.createElement("th");
      th.className = "rowlbl";
      th.textContent = label;
      tr.appendChild(th);

      cols.forEach((star, c) => {
        const td = document.createElement("td");
        const btn = document.createElement("button");
        btn.className = "cell";
        btn.type = "button";
        btn.textContent = state.counts[r][c];

        btn.addEventListener("click", () => {
          state.counts[r][c] += 1;
          state.history.push({r,c});
          // 履歴が大きくなりすぎないように制限（任意）
          if (state.history.length > 5000) state.history.shift();
          save();
          render();
        });

        td.appendChild(btn);
        tr.appendChild(td);
      });

      grid.appendChild(tr);
    });

    const total = state.counts.flat().reduce((a,b)=>a+b,0);
    meta.textContent = `合計タップ数：${total}　｜　最終更新：${new Date().toLocaleString("ja-JP")}`;
  }

  document.getElementById("resetBtn").addEventListener("click", () => {
    if (!confirm("全て0に戻します。よろしいですか？")) return;
    state.counts = Array.from({length: rows.length}, () => Array(cols.length).fill(0));
    state.history = [];
    save();
    render();
  });

  document.getElementById("undoBtn").addEventListener("click", () => {
    const last = state.history.pop();
    if (!last) return;
    const {r,c} = last;
    state.counts[r][c] = Math.max(0, state.counts[r][c] - 1);
    save();
    render();
  });

  load();
  render();
})();
</script>
</body>
</html>
