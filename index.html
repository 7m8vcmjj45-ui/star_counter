<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>レビュシートカウンター</title>
<style>
body{
  font-family:-apple-system,system-ui;
  margin:18px;
  background:#f6f7f9;
}
h1{
  font-size:24px;
  margin:0 0 14px;
}
select{
  padding:12px 16px;
  border-radius:12px;
  font-size:18px;
  margin-bottom:18px;
}
.card{
  background:#fff;
  padding:22px;
  border-radius:22px;
  box-shadow:0 8px 24px rgba(0,0,0,.08);
}
table{
  width:100%;
  table-layout:fixed;
  border-collapse:separate;
  border-spacing:10px;
}
@media (orientation:landscape){
  table{
    max-width:1000px;
    margin:0 auto;
  }
}
th{
  font-size:16px;
  font-weight:900;
  text-align:center;
}
.rowlbl{
  text-align:left;
  font-weight:900;
  white-space:nowrap;
  padding-right:4px;
  width:40px;
}
.starcol,
.sumcol{
  width:calc((100% - 40px) / 6);
}
button.cell{
  width:100%;
  aspect-ratio:1 / 1;
  border-radius:20px;
  border:none;
  background:#000;
  color:#fff;
  font-size:28px;
  font-weight:900;
  padding:0;
}
.sumBox{
  width:100%;
  aspect-ratio:1 / 1;
  border-radius:20px;
  background:#e9eaec;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:900;
  color:#000;
}

/* 縦画面では角を小さくする */
@media (orientation:portrait){
  button.cell{
    border-radius:8px;
  }
  .sumBox{
    border-radius:8px;
  }
}

button.cell:active{
  transform:scale(.96);
  opacity:.9;
}

.actions{
  display:flex;
  gap:14px;
  margin-top:20px;
}
.btn{
  flex:1;
  padding:16px;
  border-radius:18px;
  border:1px solid #ccc;
  font-weight:900;
  background:#fff;
  font-size:18px;
}
.btn.danger{
  border-color:#ffb3b3;
}
.btn:active{
  transform:scale(.97);
}
</style>
</head>

<body>
<h1>レビュシートカウンター</h1>

<select id="dateSelect">
  <option>2/16（月）</option>
  <option>2/17（火）</option>
  <option>2/18（水）</option>
  <option>2/19（木）</option>
  <option>2/20（金）</option>
  <option>2/23（月）</option>
  <option>2/24（火）</option>
  <option>2/25（水）</option>
  <option>2/26（木）</option>
  <option>2/27（金）</option>
</select>

<div class="card">
<table>
<thead>
<tr>
<th class="rowlbl"></th>
<th class="starcol">★1</th>
<th class="starcol">★2</th>
<th class="starcol">★3</th>
<th class="starcol">★4</th>
<th class="starcol">★5</th>
<th class="sumcol">計</th>
</tr>
</thead>
<tbody id="grid"></tbody>
</table>

<div class="actions">
<button class="btn" id="undoBtn">ひとつ戻す</button>
<button class="btn danger" id="resetBtn">RESET（全て0）</button>
</div>
</div>

<script>
const rows=["主菜","副菜1","副菜2"];
const cols=[1,2,3,4,5];
const KEY="review_counter_v8";

let state={};
let history=[];

function getDate(){
  return document.getElementById("dateSelect").value;
}

function initDate(date){
  if(!state[date]){
    state[date]=Array.from({length:3},()=>Array(5).fill(0));
  }
}

function load(){
  const raw=localStorage.getItem(KEY);
  if(raw){
    try{ state=JSON.parse(raw)||{} }catch{}
  }
}

function save(){
  localStorage.setItem(KEY,JSON.stringify(state));
}

function rowSum(arr){
  return arr.reduce((a,b)=>a+Number(b||0),0);
}

function render(){
  const date=getDate();
  initDate(date);

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  rows.forEach((label,r)=>{
    const tr=document.createElement("tr");

    const th=document.createElement("th");
    th.className="rowlbl";
    th.textContent=label;
    tr.appendChild(th);

    cols.forEach((_,c)=>{
      const td=document.createElement("td");
      const btn=document.createElement("button");
      btn.className="cell";
      btn.textContent=state[date][r][c];

      btn.onclick=()=>{
        state[date][r][c]++;
        history.push({date,r,c});
        save();
        render();
      };

      td.appendChild(btn);
      tr.appendChild(td);
    });

    const tdSum=document.createElement("td");
    const sumBox=document.createElement("div");
    sumBox.className="sumBox";
    sumBox.textContent=rowSum(state[date][r]);
    tdSum.appendChild(sumBox);
    tr.appendChild(tdSum);

    grid.appendChild(tr);
  });
}

function undo(){
  const last=history.pop();
  if(!last)return;
  const {date,r,c}=last;
  state[date][r][c]=Math.max(0,state[date][r][c]-1);
  save();
  render();
}

function resetDay(){
  const date=getDate();
  if(!confirm(`${date} を全て0にします。よろしいですか？`))return;
  state[date]=Array.from({length:3},()=>Array(5).fill(0));
  save();
  render();
}

document.getElementById("dateSelect").addEventListener("change",render);
document.getElementById("undoBtn").addEventListener("click",undo);
document.getElementById("resetBtn").addEventListener("click",resetDay);

load();
render();
</script>
</body>
</html>
