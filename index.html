<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>レビュシートカウンター</title>
<style>
body{font-family:-apple-system,system-ui;margin:18px;background:#f6f7f9}
h1{font-size:20px;margin-bottom:10px}
select{padding:8px 12px;border-radius:8px;font-size:16px;margin-bottom:15px}
.card{background:#fff;padding:16px;border-radius:16px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
table{width:100%;border-collapse:separate;border-spacing:10px}
th{font-size:14px}
.rowlbl{text-align:left;font-weight:bold}
button.cell{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#111;
  color:#fff;
  font-size:20px;
  font-weight:bold;
}
.actions{display:flex;gap:10px;margin-top:15px}
.btn{flex:1;padding:12px;border-radius:12px;border:1px solid #ccc;font-weight:bold}
.btn.danger{border-color:#ffb3b3}
</style>
</head>
<body>
<h1>レビュシートカウンター</h1>

<select id="dateSelect">
<option>2/16（月）</option>
<option>2/17（火）</option>
<option>2/18（水）</option>
<option>2/19（木）</option>
<option>2/20（金）</option>
<option>2/23（月）</option>
<option>2/24（火）</option>
<option>2/25（水）</option>
<option>2/26（木）</option>
<option>2/27（金）</option>
</select>

<div class="card">
<table>
<thead>
<tr>
<th></th>
<th>★1</th>
<th>★2</th>
<th>★3</th>
<th>★4</th>
<th>★5</th>
</tr>
</thead>
<tbody id="grid"></tbody>
</table>

<div class="actions">
<button class="btn" onclick="undo()">ひとつ戻す</button>
<button class="btn danger" onclick="resetDay()">RESET（全て0）</button>
</div>
</div>

<script>
const rows=["主菜","副菜1","副菜2"];
const cols=[1,2,3,4,5];
const KEY="review_counter_v2";
let state={};
let history=[];

function getDate(){
  return document.getElementById("dateSelect").value;
}

function initDate(date){
  if(!state[date]){
    state[date]=Array.from({length:3},()=>Array(5).fill(0));
  }
}

function save(){
  localStorage.setItem(KEY,JSON.stringify(state));
}

function load(){
  const raw=localStorage.getItem(KEY);
  if(raw) state=JSON.parse(raw);
}

function render(){
  const date=getDate();
  initDate(date);
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  rows.forEach((rLabel,r)=>{
    const tr=document.createElement("tr");
    const th=document.createElement("th");
    th.textContent=rLabel;
    th.className="rowlbl";
    tr.appendChild(th);
    cols.forEach((cLabel,c)=>{
      const td=document.createElement("td");
      const btn=document.createElement("button");
      btn.className="cell";
      btn.textContent=state[date][r][c];
      btn.onclick=()=>{
        state[date][r][c]++;
        history.push({date,r,c});
        save();
        render();
      };
      td.appendChild(btn);
      tr.appendChild(td);
    });
    grid.appendChild(tr);
  });
}

function undo(){
  const last=history.pop();
  if(!last)return;
  const {date,r,c}=last;
  if(state[date][r][c]>0) state[date][r][c]--;
  save();
  render();
}

function resetDay(){
  const date=getDate();
  if(!confirm(date+" を全て0にします。よろしいですか？"))return;
  state[date]=Array.from({length:3},()=>Array(5).fill(0));
  save();
  render();
}

document.getElementById("dateSelect").addEventListener("change",render);

load();
render();
</script>
</body>
</html>
