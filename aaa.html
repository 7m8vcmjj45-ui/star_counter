<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホUIプロトタイプ</title>
    <style>
        :root {
            --bg-color: #f0f0f0;
            --box-color: #ffffff;
            --active-color: #00ff00; /* 点滅・点灯の色 */
            --border-color: #ccc;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* スマホ外枠（シミュレート） */
        .phone-container {
            width: 360px;
            height: 740px;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            border: 8px solid #222;
            border-radius: 30px;
            overflow: hidden;
            box-sizing: border-box;
            position: relative;
        }

        /* 画面上部（2/3 : 1/3） */
        .top-section {
            display: flex;
            height: 45%; /* 全体の約45%を上部エリアに */
            border-bottom: 2px solid var(--border-color);
        }

        /* 画像エリア (2/3) */
        .image-area {
            width: 66.6%;
            background-color: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            border-right: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        .image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .upload-placeholder {
            text-align: center;
            color: #666;
            cursor: pointer;
        }

        /* パラメータエリア (1/3) */
        .param-area {
            width: 33.3%;
            padding: 10px 5px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            background-color: #eee;
        }

        .param-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .param-name {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .param-control {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-arrow {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px 2px;
            font-size: 14px;
            color: #444;
        }

        /* 5段階の縦長長方形 */
        .visualizer {
            display: flex;
            flex-direction: column-reverse; /* 下から積み上がるように */
            gap: 2px;
            width: 12px;
            height: 60px;
            background: #bbb;
            padding: 2px;
            border: 1px solid #999;
        }

        .step {
            flex: 1;
            background-color: #555;
            width: 100%;
        }

        /* アクティブな状態の点滅 */
        .step.active {
            background-color: var(--active-color);
            animation: blink 1s infinite;
            box-shadow: 0 0 5px var(--active-color);
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        /* 画面下部（メモ欄） */
        .bottom-section {
            flex: 1;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        .memo-label {
            font-size: 14px;
            margin-bottom: 5px;
            color: #444;
        }

        .memo-textarea {
            flex: 1;
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: none;
            font-size: 14px;
            box-sizing: border-box;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- 上部エリア -->
    <div class="top-section">
        <!-- 左：画像 -->
        <div class="image-area" id="imageArea" onclick="document.getElementById('fileInput').click()">
            <div class="upload-placeholder" id="placeholderText">
                <span>📷</span><br>タップで画像選択
            </div>
            <img id="preview" src="" style="display:none;">
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <!-- 右：パラメータ -->
        <div class="param-area">
            <!-- パラメータ① -->
            <div class="param-group">
                <div class="param-name">近さ</div>
                <div class="param-control">
                    <button class="btn-arrow" onclick="updateParam('near', -1)">◀︎</button>
                    <div class="visualizer" id="viz-near">
                        <div class="step"></div><div class="step"></div><div class="step"></div><div class="step"></div><div class="step"></div>
                    </div>
                    <button class="btn-arrow" onclick="updateParam('near', 1)">▶︎</button>
                </div>
            </div>
            <!-- パラメータ② -->
            <div class="param-group">
                <div class="param-name">固さ</div>
                <div class="param-control">
                    <button class="btn-arrow" onclick="updateParam('hard', -1)">◀︎</button>
                    <div class="visualizer" id="viz-hard">
                        <div class="step"></div><div class="step"></div><div class="step"></div><div class="step"></div><div class="step"></div>
                    </div>
                    <button class="btn-arrow" onclick="updateParam('hard', 1)">▶︎</button>
                </div>
            </div>
            <!-- パラメータ③ -->
            <div class="param-group">
                <div class="param-name">見た目</div>
                <div class="param-control">
                    <button class="btn-arrow" onclick="updateParam('look', -1)">◀︎</button>
                    <div class="visualizer" id="viz-look">
                        <div class="step"></div><div class="step"></div><div class="step"></div><div class="step"></div><div class="step"></div>
                    </div>
                    <button class="btn-arrow" onclick="updateParam('look', 1)">▶︎</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 下部エリア -->
    <div class="bottom-section">
        <div class="memo-label">メモ欄</div>
        <textarea class="memo-textarea" placeholder="こちらに詳細を入力してください..."></textarea>
    </div>
</div>

<script>
    // パラメータ管理
    const params = {
        near: 1,
        hard: 1,
        look: 1
    };

    function updateParam(id, delta) {
        // 数値更新 (1-5の範囲)
        const newVal = params[id] + delta;
        if (newVal >= 1 && newVal <= 5) {
            params[id] = newVal;
            renderParams();
        }
    }

    function renderParams() {
        Object.keys(params).forEach(key => {
            const val = params[key];
            const viz = document.getElementById(`viz-${key}`);
            const steps = viz.querySelectorAll('.step');
            
            steps.forEach((step, index) => {
                // インデックスは0-4、値は1-5なので比較
                if (index < val) {
                    step.classList.add('active');
                } else {
                    step.classList.remove('active');
                }
            });
        });
    }

    // 画像アップロード処理
    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.getElementById('preview');
                img.src = event.target.result;
                img.style.display = 'block';
                document.getElementById('placeholderText').style.display = 'none';
            }
            reader.readAsDataURL(file);
        }
    });

    // 初期描画
    renderParams();
</script>

</body>
</html>
